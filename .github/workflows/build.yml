name: Build

on:
  pull_request:
    branches: [master]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/**"
      - ".golangci.yml"
      - ".pre-commit-config.yaml"

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-only: true
          version: "v2.11.4"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  build:
    name: Build binaries
    needs: pre-commit
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          LDFLAGS="-X main.Tag=dev -X main.Commit=$(git rev-parse --short HEAD) -X 'main.BuildDate=$(date -u '+%d-%m-%Y %H:%M')'"
          go build -ldflags "$LDFLAGS" -o lora-config-SX1262-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/lora-config-sx1262

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: lora-config-SX1262-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lora-config-SX1262-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
